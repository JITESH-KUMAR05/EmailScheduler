name: Deploy Backend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - "server/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout your code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      # 3. Install dependencies
      - name: Install dependencies
        working-directory: ./server
        run: npm ci

      # 4. Compile TypeScript → dist/ folder
      - name: Build TypeScript
        working-directory: ./server
        run: npm run build

      # 5. Remove dev dependencies to reduce deployment size
      - name: Remove dev dependencies
        working-directory: ./server
        run: npm prune --omit=dev

      # 6. Deploy the whole server/ folder to Azure
      #    Azure will run "npm start" which uses concurrently to run
      #    both the API server (dist/server.js) and worker (dist/worker/emailWorker.js)
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ./server
